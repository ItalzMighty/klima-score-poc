<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Klima-Score PoC</title>
<style>
  :root {
    --red: #CF1820; --orange: #EC6525; --purple: #AF368C;
    --bg: #0f0e0d; --surface: #1a1917; --surface2: #222120;
    --border: #2e2d2b; --text: #f0efed; --muted: #888580;
    --green: #5a9e3a; --blue: #3a7abf;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: var(--bg); color: var(--text); font-family: system-ui, -apple-system, sans-serif; min-height: 100dvh; }

  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 14px 20px;
    display: flex; align-items: center; gap: 12px; position: sticky; top: 0; z-index: 100;
  }
  .logo-bars { display: flex; gap: 3px; }
  .logo-bars span { width: 14px; height: 3px; border-radius: 2px; display: block; }
  header h1 { font-size: 16px; font-weight: 700; }
  header p { font-size: 11px; color: var(--muted); margin-top: 1px; }
  .live-pill {
    margin-left: auto; display: flex; align-items: center; gap: 6px;
    padding: 5px 12px; border-radius: 100px; border: none; cursor: pointer;
    font-size: 12px; font-weight: 700; transition: all .2s;
    background: var(--surface2); color: var(--muted); border: 1px solid var(--border);
  }
  .live-pill.active { background: #1a2e1a; color: #6daa45; border-color: #3a5a2a; }
  .live-dot { width: 7px; height: 7px; border-radius: 50%; background: currentColor; }
  .live-pill.active .live-dot { animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:.3; } }

  main { padding: 16px; max-width: 480px; margin: 0 auto; display: flex; flex-direction: column; gap: 14px; }

  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; }
  .card-header { padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
  .card-title { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .07em; }

  .preview-wrap { position: relative; aspect-ratio: 4/3; background: #000; }
  #videoEl { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; display: none; }
  #overlayCanvas { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; }
  .placeholder { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; color: var(--muted); }
  .placeholder svg { opacity: .3; }
  .placeholder p { font-size: 13px; }

  .btn-row { padding: 12px 14px; display: flex; gap: 8px; }
  .btn-main {
    flex: 1; padding: 13px; border-radius: 12px; border: none; cursor: pointer;
    background: linear-gradient(135deg, var(--red), var(--orange));
    color: white; font-size: 15px; font-weight: 700; transition: opacity .2s;
  }
  .btn-main:disabled { opacity: .4; cursor: not-allowed; }
  .btn-reset {
    padding: 13px 16px; border-radius: 12px; border: 1px solid var(--border);
    background: var(--surface2); color: var(--muted); font-size: 16px; cursor: pointer; display: none;
  }

  /* MODE TOGGLE */
  .mode-toggle { display: flex; background: var(--surface2); border-radius: 8px; padding: 3px; gap: 3px; }
  .mode-toggle button {
    font-size: 12px; padding: 5px 12px; border-radius: 6px; border: none;
    cursor: pointer; background: transparent; color: var(--muted); font-weight: 600; transition: all .2s;
  }
  .mode-toggle button.active { background: var(--orange); color: white; }

  /* GRID */
  .cell-grid { display: grid; grid-template-columns: repeat(5,1fr); gap: 4px; padding: 14px; }
  .cell {
    aspect-ratio: 1; border-radius: 8px; display: flex; flex-direction: column;
    align-items: center; justify-content: center; font-size: 9px; font-weight: 700;
    color: rgba(255,255,255,.9); text-align: center; line-height: 1.2;
    border: 1.5px solid rgba(255,255,255,.07); transition: background .3s;
  }
  .cell .sc { font-size: 11px; font-weight: 900; margin-top: 1px; }

  /* SCORE */
  .score-wrap { padding: 16px; }
  .score-top { display: flex; align-items: center; gap: 14px; margin-bottom: 14px; }
  .score-ring {
    width: 72px; height: 72px; border-radius: 50%; flex-shrink: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    border: 3px solid var(--border); transition: border-color .4s;
  }
  .score-num { font-size: 24px; font-weight: 900; line-height: 1; transition: color .4s; }
  .score-lbl { font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; }
  .score-info h3 { font-size: 18px; font-weight: 800; margin-bottom: 3px; transition: all .3s; }
  .score-info p { font-size: 12px; color: var(--muted); line-height: 1.5; }
  .bar-track { height: 7px; border-radius: 100px; background: var(--surface2); margin-bottom: 6px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 100px; transition: width .5s cubic-bezier(.16,1,.3,1), background .5s; }
  .bar-labels { display: flex; justify-content: space-between; margin-bottom: 14px; }
  .bar-labels span { font-size: 10px; color: var(--muted); }

  /* BREAKDOWN */
  .breakdown { display: flex; flex-direction: column; gap: 7px; margin-bottom: 14px; }
  .brow { display: flex; align-items: center; gap: 8px; }
  .bswatch { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }
  .bname { font-size: 13px; flex: 1; }
  .bcount { font-size: 12px; color: var(--muted); }
  .bbar-wrap { width: 60px; height: 4px; background: var(--surface2); border-radius: 100px; overflow: hidden; }
  .bbar { height: 100%; border-radius: 100px; transition: width .4s; }
  .bscore { font-size: 12px; font-weight: 700; min-width: 36px; text-align: right; }

  /* FORMULA */
  .formula { background: var(--surface2); border-radius: 10px; padding: 12px 14px; margin: 0 16px 16px; }
  .formula p { font-size: 11px; color: var(--muted); line-height: 1.7; }
  .formula code { color: var(--orange); font-family: monospace; font-size: 11px; }

  /* DEBUG */
  .debug-scroll { overflow-x: auto; padding: 0 14px 14px; }
  table { width: 100%; border-collapse: collapse; font-size: 11px; }
  th { text-align: left; color: var(--muted); padding: 4px 6px; border-bottom: 1px solid var(--border); font-weight: 600; }
  td { padding: 4px 6px; border-bottom: 1px solid rgba(255,255,255,.03); font-family: monospace; }
  tr:last-child td { border-bottom: none; }

  .hidden { display: none !important; }
</style>
</head>
<body>

<header>
  <div class="logo-bars">
    <span style="background:#CF1820"></span>
    <span style="background:#EC6525"></span>
    <span style="background:#AF368C"></span>
  </div>
  <div>
    <h1>Klima-Score PoC</h1>
    <p>Urbane Hitzeeffekt-Analyse</p>
  </div>
  <button class="live-pill" id="liveToggle" onclick="toggleLive()" style="display:none">
    <span class="live-dot"></span>
    <span id="liveLabel">Live</span>
  </button>
</header>

<main>

  <!-- KAMERA CARD -->
  <div class="card">
    <div class="card-header">
      <span class="card-title">Kamera</span>
      <div class="mode-toggle">
        <button id="btnSnap" class="active" onclick="setMode('snap')">📸 Snapshot</button>
        <button id="btnLive" onclick="setMode('live')">🔴 Live</button>
      </div>
    </div>
    <div class="preview-wrap">
      <video id="videoEl" autoplay playsinline muted></video>
      <canvas id="overlayCanvas"></canvas>
      <div class="placeholder" id="placeholder">
        <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
        <p>Kamera starten</p>
      </div>
    </div>
    <div class="btn-row">
      <button class="btn-main" id="mainBtn" onclick="handleMain()">▶ Kamera starten</button>
      <button class="btn-reset" id="resetBtn" onclick="resetAll()">↺</button>
    </div>
  </div>

  <!-- GRID CARD -->
  <div class="card hidden" id="gridCard">
    <div class="card-header"><span class="card-title">Erkannte Zellen (5×5)</span></div>
    <div class="cell-grid" id="cellGrid"></div>
  </div>

  <!-- SCORE CARD -->
  <div class="card hidden" id="scoreCard">
    <div class="card-header"><span class="card-title">Klima-Score</span></div>
    <div class="score-wrap">
      <div class="score-top">
        <div class="score-ring" id="scoreRing">
          <div class="score-num" id="scoreNum">–</div>
          <div class="score-lbl">Score</div>
        </div>
        <div class="score-info">
          <h3 id="scoreTitle">–</h3>
          <p id="scoreDesc">–</p>
        </div>
      </div>
      <div class="bar-track"><div class="bar-fill" id="barFill" style="width:50%"></div></div>
      <div class="bar-labels"><span>🔴 −100</span><span>+100 🟢</span></div>
      <div class="breakdown" id="breakdown"></div>
    </div>
    <div class="formula" id="formulaBox"><p id="formulaText"></p></div>
  </div>

  <!-- DEBUG CARD -->
  <div class="card hidden" id="debugCard">
    <div class="card-header"><span class="card-title">Debug – HSL je Zelle</span></div>
    <div class="debug-scroll">
      <table><thead><tr><th>Zelle</th><th>H°</th><th>S%</th><th>L%</th><th>Kategorie</th><th>Score</th></tr></thead>
      <tbody id="debugBody"></tbody></table>
    </div>
  </div>

</main>

<script>
const CATS = [
  { id:'green',  name:'Grünfläche',        score:4,  color:'#5a9e3a', emoji:'🌿', match:(h,s,l)=> h>=75&&h<=165&&s>=25&&l>=15&&l<=75 },
  { id:'water',  name:'Wasserfläche',       score:3,  color:'#3a7abf', emoji:'💧', match:(h,s,l)=> h>=175&&h<=255&&s>=25&&l>=15&&l<=75 },
  { id:'low',    name:'Niedrige Bebauung',  score:-1, color:'#c9a227', emoji:'🏠', match:(h,s,l)=> h>=35&&h<75&&s>=20&&l>=40 },
  { id:'mid',    name:'Mittlere Bebauung',  score:-2, color:'#8b5e3c', emoji:'🏢', match:(h,s,l)=> h>=15&&h<45&&s>=15&&l>=20&&l<55 },
  { id:'dense',  name:'Dichte Bebauung',    score:-3, color:'#4a4642', emoji:'🏙️', match:(h,s,l)=> l<28 },
  { id:'sealed', name:'Versiegelt',         score:-4, color:'#7a7672', emoji:'🛣️', match:(h,s,l)=> s<14&&l>=28&&l<=78 },
  { id:'unknown',name:'Unbekannt',          score:0,  color:'#3a3836', emoji:'❓', match:()=>true },
];

function classify(h,s,l){ for(const c of CATS) if(c.match(h,s,l)) return c; return CATS[6]; }

function rgbToHsl(r,g,b){
  r/=255;g/=255;b/=255;
  const mx=Math.max(r,g,b),mn=Math.min(r,g,b);
  let h,s,l=(mx+mn)/2;
  if(mx===mn){h=s=0;}
  else{
    const d=mx-mn;
    s=l>.5?d/(2-mx-mn):d/(mx+mn);
    switch(mx){
      case r:h=((g-b)/d+(g<b?6:0))/6;break;
      case g:h=((b-r)/d+2)/6;break;
      case b:h=((r-g)/d+4)/6;break;
    }
  }
  return[Math.round(h*360),Math.round(s*100),Math.round(l*100)];
}

function medianRGB(data,x,y,w,h,W){
  const rs=[],gs=[],bs=[];
  for(let row=y;row<y+h;row++) for(let col=x;col<x+w;col++){
    const i=(row*W+col)*4; rs.push(data[i]);gs.push(data[i+1]);bs.push(data[i+2]);
  }
  const m=a=>{a.sort((x,y)=>x-y);return a[Math.floor(a.length/2)];};
  return[m(rs),m(gs),m(bs)];
}

function analyzeFrame(src){
  const S=300, G=5;
  const off=document.createElement('canvas'); off.width=S;off.height=S;
  const ctx=off.getContext('2d'); ctx.drawImage(src,0,0,S,S);
  const d=ctx.getImageData(0,0,S,S).data;
  const cw=Math.floor(S/G),ch=Math.floor(S/G);
  return Array.from({length:G},(_,row)=>Array.from({length:G},(_,col)=>{
    const [r,g,b]=medianRGB(d,col*cw,row*ch,cw,ch,S);
    const [h,s,l]=rgbToHsl(r,g,b);
    return{row,col,h,s,l,cat:classify(h,s,l)};
  })).flat();
}

function renderResults(cells){
  // Grid
  const grid=document.getElementById('cellGrid'); grid.innerHTML='';
  cells.forEach(c=>{
    const d=document.createElement('div'); d.className='cell';
    d.style.background=c.cat.color;
    d.innerHTML=`<span>${c.cat.emoji}</span><span class="sc">${c.cat.score>0?'+':''}${c.cat.score}</span>`;
    grid.appendChild(d);
  });
  document.getElementById('gridCard').classList.remove('hidden');

  // Score
  const raw=cells.reduce((s,c)=>s+c.cat.score,0);
  const n=cells.length, mx=n*4, mn=n*-4;
  const norm=Math.round(((raw-mn)/(mx-mn))*200-100);
  const pct=(norm+100)/200*100;
  let title,desc,col;
  if(norm>=50){title='Sehr kühlend 🟢';desc='Hoher Grün-/Wasseranteil.';col='#5a9e3a';}
  else if(norm>=20){title='Kühlend 🟡';desc='Überwiegend positive Flächen.';col='#8aba3a';}
  else if(norm>=-10){title='Neutral ⚪';desc='Ausgeglichene Mischung.';col='#888580';}
  else if(norm>=-40){title='Wärmend 🟠';desc='Zu viel versiegelte Flächen.';col='#EC6525';}
  else{title='Stark wärmend 🔴';desc='Hoher UHI-Effekt zu erwarten.';col='#CF1820';}

  document.getElementById('scoreNum').textContent=norm;
  document.getElementById('scoreNum').style.color=col;
  document.getElementById('scoreRing').style.borderColor=col;
  document.getElementById('scoreTitle').textContent=title;
  document.getElementById('scoreDesc').textContent=desc;
  const bf=document.getElementById('barFill');
  bf.style.width=pct+'%'; bf.style.background=`linear-gradient(90deg,#CF1820,${col})`;

  // Breakdown
  const counts={};
  cells.forEach(c=>{if(!counts[c.cat.id])counts[c.cat.id]={cat:c.cat,n:0};counts[c.cat.id].n++;});
  const blist=Object.values(counts).sort((a,b)=>b.n-a.n);
  const br=document.getElementById('breakdown'); br.innerHTML='';
  blist.forEach(({cat,n:cnt})=>{
    const contrib=cnt*cat.score;
    const r=document.createElement('div'); r.className='brow';
    r.innerHTML=`<div class="bswatch" style="background:${cat.color}"></div>
      <span class="bname">${cat.emoji} ${cat.name}</span>
      <span class="bcount">${cnt}×</span>
      <div class="bbar-wrap"><div class="bbar" style="width:${cnt/n*100}%;background:${cat.color}"></div></div>
      <span class="bscore" style="color:${contrib>=0?'#5a9e3a':'#CF1820'}">${contrib>0?'+':''}${contrib}</span>`;
    br.appendChild(r);
  });

  // Formula
  const parts=blist.map(({cat,n:cnt})=>`${cnt}×(${cat.score>0?'+':''}${cat.score})`).join('+');
  document.getElementById('formulaText').innerHTML=`<code>${parts} = ${raw}</code><br>Normiert: <code>Score = ${norm}</code>`;
  document.getElementById('scoreCard').classList.remove('hidden');

  // Debug
  const tb=document.getElementById('debugBody'); tb.innerHTML='';
  cells.forEach(c=>{
    const tr=document.createElement('tr');
    tr.innerHTML=`<td>${String.fromCharCode(65+c.row)}${c.col+1}</td><td>${c.h}°</td><td>${c.s}%</td><td>${c.l}%</td><td style="color:${c.cat.color}">${c.cat.emoji} ${c.cat.name}</td><td style="color:${c.cat.score>=0?'#5a9e3a':'#CF1820'};font-weight:700">${c.cat.score>0?'+':''}${c.cat.score}</td>`;
    tb.appendChild(tr);
  });
  document.getElementById('debugCard').classList.remove('hidden');

  // Overlay
  drawOverlay(cells);
}

function drawOverlay(cells){
  const wrap=document.querySelector('.preview-wrap');
  const cv=document.getElementById('overlayCanvas');
  cv.width=wrap.clientWidth; cv.height=wrap.clientHeight;
  const ctx=cv.getContext('2d');
  ctx.clearRect(0,0,cv.width,cv.height);
  const G=5,cw=cv.width/G,ch=cv.height/G;
  cells.forEach(c=>{
    const x=c.col*cw,y=c.row*ch;
    ctx.strokeStyle=c.cat.color; ctx.lineWidth=2;
    ctx.strokeRect(x+1,y+1,cw-2,ch-2);
    ctx.fillStyle=c.cat.color+'33';
    ctx.fillRect(x+1,y+1,cw-2,ch-2);
    ctx.fillStyle='white';
    ctx.font=`bold ${Math.floor(ch*.28)}px system-ui`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(c.cat.emoji,x+cw/2,y+ch/2);
  });
}

// ─── STATE ───────────────────────────────────────────────────────────────────
let stream=null, cameraOn=false, mode='snap', liveInterval=null;

function setMode(m){
  mode=m;
  document.getElementById('btnSnap').classList.toggle('active',m==='snap');
  document.getElementById('btnLive').classList.toggle('active',m==='live');
  if(!cameraOn) return;
  if(m==='live'){
    document.getElementById('mainBtn').textContent='📸 Snapshot';
    document.getElementById('liveToggle').style.display='flex';
  } else {
    stopLive();
    document.getElementById('liveToggle').style.display='none';
    document.getElementById('mainBtn').textContent='📸 Snapshot';
  }
}

function toggleLive(){
  const btn=document.getElementById('liveToggle');
  if(liveInterval){
    stopLive();
  } else {
    startLive();
  }
}

function startLive(){
  const btn=document.getElementById('liveToggle');
  btn.classList.add('active');
  document.getElementById('liveLabel').textContent='Live – Stop';
  liveInterval=setInterval(()=>{
    const video=document.getElementById('videoEl');
    if(video.readyState>=2){
      const cells=analyzeFrame(video);
      renderResults(cells);
    }
  },1500);
}

function stopLive(){
  clearInterval(liveInterval); liveInterval=null;
  const btn=document.getElementById('liveToggle');
  btn.classList.remove('active');
  document.getElementById('liveLabel').textContent='Live';
}

async function startCamera(){
  try{
    stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment',width:1280,height:960},audio:false});
    const v=document.getElementById('videoEl');
    v.srcObject=stream; v.style.display='block';
    document.getElementById('placeholder').style.display='none';
    cameraOn=true;
    document.getElementById('mainBtn').textContent='📸 Snapshot';
    document.getElementById('resetBtn').style.display='block';
    if(mode==='live') document.getElementById('liveToggle').style.display='flex';
  } catch(e){
    alert('Kamera-Zugriff nicht möglich.\nLokal: Bitte GitHub Pages URL nutzen (HTTPS erforderlich).');
  }
}

function handleMain(){
  if(!cameraOn){ startCamera(); return; }
  const video=document.getElementById('videoEl');
  if(video.readyState>=2){
    const cells=analyzeFrame(video);
    renderResults(cells);
  }
}

function resetAll(){
  stopLive();
  if(stream){stream.getTracks().forEach(t=>t.stop());stream=null;}
  cameraOn=false;
  const v=document.getElementById('videoEl'); v.srcObject=null; v.style.display='none';
  document.getElementById('overlayCanvas').getContext('2d').clearRect(0,0,9999,9999);
  document.getElementById('placeholder').style.display='flex';
  document.getElementById('gridCard').classList.add('hidden');
  document.getElementById('scoreCard').classList.add('hidden');
  document.getElementById('debugCard').classList.add('hidden');
  document.getElementById('mainBtn').textContent='▶ Kamera starten';
  document.getElementById('mainBtn').disabled=false;
  document.getElementById('resetBtn').style.display='none';
  document.getElementById('liveToggle').style.display='none';
}
</script>
</body>
</html>
